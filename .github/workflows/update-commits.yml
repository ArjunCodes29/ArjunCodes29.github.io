name: Update Commits

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch commits from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s "https://api.github.com/repos/${{ github.repository }}/commits?per_page=100" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            > commits.json
          
          # Verify the JSON is valid
          python3 -c "import json; json.load(open('commits.json'))"
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commits.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commits.json"
          else
            git commit -m "chore: update commits.json [skip ci]"
            git push
          fi

